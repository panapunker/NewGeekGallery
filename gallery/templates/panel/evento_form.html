<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nuevo Evento | NewGeek Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{

--background:#0b0b0b;
--panel:#181818;
--panel2:#202020;
--border:#303030;

--primary:#7c3aed;
--primaryHover:#6d28d9;

--text:#ffffff;
--muted:#9f9f9f;

--danger:#dc2626;

}

body{

background:var(--background);

font-family:Arial,sans-serif;

color:var(--text);

min-height:100vh;

}

header{

height:80px;

background:#121212;

border-bottom:1px solid var(--border);

display:flex;

justify-content:space-between;

align-items:center;

padding:0 40px;

}

.logo{

font-size:28px;

font-weight:bold;

}

.back{

text-decoration:none;

color:white;

background:#333;

padding:12px 20px;

border-radius:10px;

transition:.2s;

}

.back:hover{

background:#444;

}

.container{

max-width:900px;

margin:50px auto;

padding:0 20px;

}

.card{

background:var(--panel);

border:1px solid var(--border);

border-radius:24px;

padding:40px;

}

h1{

font-size:36px;

margin-bottom:10px;

}

.subtitle{

color:var(--muted);

margin-bottom:40px;

}

label{

display:block;

margin-bottom:10px;

font-size:16px;

font-weight:bold;

}

input[type=text]{

width:100%;

padding:18px;

border-radius:14px;

border:1px solid var(--border);

background:#111;

color:white;

font-size:16px;

margin-bottom:30px;

outline:none;

}

input[type=text]:focus{

border-color:var(--primary);

}

.dropzone{

border:3px dashed #555;

border-radius:20px;

padding:50px;

text-align:center;

background:#101010;

cursor:pointer;

transition:.25s;

margin-bottom:25px;

}

.dropzone:hover{

border-color:var(--primary);

background:#151515;

}

.dropzone p{

font-size:18px;

margin-bottom:12px;

}

.dropzone span{

color:var(--muted);

}

input[type=file]{

display:none;

}

.preview{

display:none;

margin-top:25px;

}

.preview img{

width:100%;

max-height:450px;

object-fit:cover;

border-radius:18px;

border:1px solid var(--border);

}

.actions{

margin-top:40px;

display:flex;

justify-content:space-between;

gap:20px;

flex-wrap:wrap;

}

.btn{

padding:18px 35px;

border:none;

border-radius:14px;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.25s;

text-decoration:none;

display:inline-flex;

align-items:center;

justify-content:center;

}

.cancel{

background:#444;

color:white;

}

.cancel:hover{

background:#555;

}

.save{

background:var(--primary);

color:white;

}

.save:hover{

background:var(--primaryHover);

}

@media(max-width:700px){

header{

padding:20px;

height:auto;

flex-direction:column;

gap:20px;

}

.logo{

font-size:24px;

}

.card{

padding:25px;

}

h1{

font-size:28px;

}

.actions{

flex-direction:column;

}

.btn{

width:100%;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

NewGeek Gallery

</div>

<a
href="{% url 'dashboard' %}"
class="back">

← Volver

</a>

</header>

<div class="container">

<div class="card">

<h1>

Nuevo evento

</h1>

<p class="subtitle">

Crea un nuevo evento para comenzar a subir fotografías.

</p>

<form
method="post"
enctype="multipart/form-data">

{% csrf_token %}

<label>

Nombre del evento

</label>

<input
type="text"
name="nombre"
required>

<label>

Portada del evento

</label>

<label
class="dropzone"
for="portada">

<p>

Haz clic aquí para seleccionar la portada

</p>

<span>

JPG · PNG · WEBP

</span>

</label>

<input
type="file"
id="portada"
name="portada"
accept="image/*"
required>

<div
class="preview"
id="preview">

<img
id="previewImage">

</div>
<hr style="margin:40px 0;border:1px solid #333;">

<label>

Fotografías del evento

</label>

<input

type="file"

name="fotografias"

multiple

accept="image/*"

style="display:block;width:100%;padding:18px;background:#111;border:1px solid #333;border-radius:12px;color:white;">

<p style="margin-top:15px;color:#999;">

Puedes seleccionar 2, 20, 100 o más fotografías.

</p>
<div class="actions">

    <a
        href="{% url 'dashboard' %}"
        class="btn cancel">

        Cancelar

    </a>

    <button
        type="submit"
        class="btn save">

        Crear evento

    </button>

</div>

</form>

</div>

</div>

<script>

const input = document.getElementById("portada");

const preview = document.getElementById("preview");

const image = document.getElementById("previewImage");

const dropzone = document.querySelector(".dropzone");

input.addEventListener("change", function(){

    if(this.files.length===0){

        preview.style.display="none";

        return;

    }

    const archivo=this.files[0];

    const lector=new FileReader();

    lector.onload=function(e){

        image.src=e.target.result;

        preview.style.display="block";

    };

    lector.readAsDataURL(archivo);

});

dropzone.addEventListener("dragover",function(e){

    e.preventDefault();

    dropzone.style.borderColor="#7c3aed";

});

dropzone.addEventListener("dragleave",function(){

    dropzone.style.borderColor="#555";

});

dropzone.addEventListener("drop",function(e){

    e.preventDefault();

    dropzone.style.borderColor="#555";

    input.files=e.dataTransfer.files;

    input.dispatchEvent(new Event("change"));

});

</script>

</body>

</html>
